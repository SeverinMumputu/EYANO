<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eyano - Core Logique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc; /* Slate 50 */
        }
        /* Custom scrollbar for chat logs */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-4 md:p-8">

    <div class="w-full max-w-4xl bg-slate-800 rounded-2xl shadow-2xl overflow-hidden flex flex-col h-[85vh] border border-slate-700">
        
        <!-- En-tête -->
        <header class="bg-slate-900 p-4 border-b border-slate-700 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-emerald-500 flex items-center justify-center font-bold text-lg shadow-[0_0_15px_rgba(16,185,129,0.5)]">
                    E
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wide">EYANO <span class="text-xs text-emerald-400 font-normal ml-2">CORE v1.0</span></h1>
                    <p class="text-xs text-slate-400">Assistant vocal d'espagnol basé sur des règles</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2 text-sm">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <span class="text-slate-300">Système en ligne</span>
            </div>
        </header>

        <!-- Zone de conversation (Logs) -->
        <main id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4">
            <!-- Message de bienvenue -->
            <div class="flex w-full mt-2 space-x-3 max-w-2xl">
                <div class="flex-shrink-0 h-8 w-8 rounded-full bg-emerald-500 flex items-center justify-center font-bold text-xs">E</div>
                <div>
                    <div class="bg-slate-700 p-3 rounded-r-lg rounded-bl-lg text-sm text-slate-100 leading-relaxed shadow-md border border-slate-600">
                        Initialisation d'Eyano Core... <br>
                        Moteur de commande texte : Prêt.<br>
                        Module vocal (Text-to-Speech) : Prêt.<br>
                        Base de connaissance locale : Chargée.<br><br>
                        <em>Essayez de dire : "Hola", "Quiero practicar", ou "Hablo".</em>
                    </div>
                </div>
            </div>
        </main>

        <!-- Contrôles et Input -->
        <footer class="bg-slate-900 p-4 border-t border-slate-700">
            <form id="command-form" class="flex gap-3">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Entrez une commande texte en espagnol..." 
                    class="flex-1 bg-slate-800 text-white rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-500 border border-slate-600 transition-all"
                    autocomplete="off"
                >
                <button 
                    type="submit" 
                    class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-lg font-semibold transition-colors flex items-center gap-2 shadow-lg"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                      <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                    Envoyer
                </button>
            </form>
            <div class="mt-2 text-center">
                <button id="toggle-voice" class="text-xs text-slate-400 hover:text-white transition-colors underline">
                    Désactiver les réponses vocales
                </button>
            </div>
        </footer>
    </div>

    <script>
        /**
         * ====================================================================
         * SECTION 1 : BACKEND LOGIQUE (EYANO CORE)
         * C'est cette classe qui sera destinée à votre environnement Node.js.
         * Elle ne contient aucune logique d'interface, uniquement le cerveau basé sur des règles.
         * ====================================================================
         */
        class EyanoCoreLogic {
            constructor() {
                // Base de connaissance statique (Étape 4 simplifiée pour le MVP Étape 1)
                this.knowledgeBase = [
                    {
                        intents: ["hola", "buenos", "buenas", "saludos", "que tal"],
                        responses: [
                            "¡Hola! Soy Eyano. ¿En qué tema de español te gustaría practicar hoy?", 
                            "¡Buenos días! ¿Qué nociones de español vamos a revisar?"
                        ]
                    },
                    {
                        intents: ["practicar", "estudiar", "aprender"],
                        responses: [
                            "Excelente. ¿Qué te gustaría practicar? ¿Gramática, conjugación de verbos o vocabulario?",
                            "Muy bien. Para empezar, elige un tema: conjugación, expresiones útiles o gramática."
                        ]
                    },
                    {
                        intents: ["verbos", "conjugacion", "conjugar"],
                        responses: [
                            "Perfecto. Empecemos con un verbo regular. ¿Cómo se conjuga el verbo 'hablar' en la primera persona del presente (yo)?",
                            "Bien, la conjugación es muy importante. Dime, ¿cuál es la primera persona del presente para el verbo 'hablar'?"
                        ]
                    },
                    {
                        intents: ["yo hablo", "hablo"],
                        responses: [
                            "¡Excelente! 'Yo hablo' es correcto. ¿Y cómo dirías para 'nosotros'?",
                            "¡Muy bien! Exacto. Ahora, conjuga el mismo verbo para 'nosotros'."
                        ]
                    },
                    {
                        intents: ["nosotros hablamos", "hablamos"],
                        responses: [
                            "¡Perfecto! Tienes un buen nivel. Puedes proponer otro tema cuando quieras.",
                            "¡Felicidades! Es correcto. ¿Quieres intentar con un verbo irregular ahora, como 'ser' o 'ir'?"
                        ]
                    },
                    {
                        intents: ["si", "claro", "por supuesto", "vale"],
                        responses: [
                            "Muy bien, continuemos entonces. ¿De qué quieres hablar ahora?",
                            "¡Genial! Me gusta tu entusiasmo."
                        ]
                    },
                    {
                        intents: ["no", "gracias", "basta", "terminar"],
                        responses: [
                            "De acuerdo. Ha sido un placer practicar contigo. ¡Hasta luego!",
                            "Está bien. Descansa un poco y volvemos a practicar más tarde. ¡Adiós!"
                        ]
                    }
                ];

                // Fallbacks si aucune règle ne correspond
                this.fallbacks = [
                    "Lo siento, no he entendido bien. ¿Puedes formularlo de otra manera?",
                    "Aún estoy aprendiendo. ¿Podemos hablar de verbos o gramática?",
                    "No tengo esa información en mi memoria actual. Intenta con saludos o pide practicar verbos."
                ];
            }

            // Normalise le texte (enlève les accents, majuscules, ponctuation) pour faciliter la comparaison
            normalizeText(text) {
                return text.toLowerCase()
                           .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // Supprime les accents
                           .replace(/[^\w\s]/gi, '') // Supprime la ponctuation
                           .trim();
            }

            // Moteur de traitement de la commande texte
            async processRequest(userInput) {
                // Simulation d'une latence réseau/traitement backend Node.js
                await new Promise(resolve => setTimeout(resolve, 600));

                const normalizedInput = this.normalizeText(userInput);
                let matchedResponse = null;

                // Algorithme de recherche par mot-clé (Règles logiques)
                for (const rule of this.knowledgeBase) {
                    // Vérifie si un des mots-clés de l'intention est présent dans la phrase de l'utilisateur
                    const isMatch = rule.intents.some(intent => normalizedInput.includes(this.normalizeText(intent)));
                    
                    if (isMatch) {
                        // Choisir une réponse aléatoire parmi celles disponibles pour cette intention
                        const randomIndex = Math.floor(Math.random() * rule.responses.length);
                        matchedResponse = rule.responses[randomIndex];
                        break;
                    }
                }

                // Si aucune règle n'a matché, utiliser un fallback
                if (!matchedResponse) {
                    const randomFallbackIndex = Math.floor(Math.random() * this.fallbacks.length);
                    matchedResponse = this.fallbacks[randomFallbackIndex];
                }

                return {
                    originalInput: userInput,
                    normalizedInput: normalizedInput,
                    response: matchedResponse,
                    timestamp: new Date().toISOString()
                };
            }
        }

        /**
         * ====================================================================
         * SECTION 2 : MODULE VOCAL & INTERFACE UI (Frontend)
         * Gère l'affichage, les événements et le Text-to-Speech via l'API Web Speech
         * ====================================================================
         */
        
        // Initialisation de l'instance Core (Simulation du Backend)
        const eyanoBackend = new EyanoCoreLogic();
        
        // Éléments du DOM
        const form = document.getElementById('command-form');
        const input = document.getElementById('user-input');
        const chatContainer = document.getElementById('chat-container');
        const toggleVoiceBtn = document.getElementById('toggle-voice');

        let voiceEnabled = true;
        let spanishVoice = null;

        // Configuration de la synthèse vocale
        function initVoice() {
            if (!('speechSynthesis' in window)) {
                console.warn("Text-to-Speech non supporté par ce navigateur.");
                return;
            }

            const loadVoices = () => {
                const voices = window.speechSynthesis.getVoices();
                // Chercher une voix espagnole (Mexique ou Espagne)
                spanishVoice = voices.find(v => v.lang.startsWith('es-') || v.lang === 'es');
                if(!spanishVoice && voices.length > 0) {
                    console.warn("Voix espagnole non trouvée, utilisation de la voix par défaut.");
                    spanishVoice = voices[0];
                }
            };

            loadVoices();
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
                window.speechSynthesis.onvoiceschanged = loadVoices;
            }
        }

        function speak(text) {
            if (!voiceEnabled || !('speechSynthesis' in window)) return;
            
            // Couper la voix en cours s'il y en a une
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            if (spanishVoice) {
                utterance.voice = spanishVoice;
            }
            utterance.lang = 'es-ES'; // Forcer la prononciation espagnole
            utterance.rate = 0.95; // Vitesse légèrement ralentie pour la compréhension
            utterance.pitch = 1.0;

            window.speechSynthesis.speak(utterance);
        }

        toggleVoiceBtn.addEventListener('click', () => {
            voiceEnabled = !voiceEnabled;
            if(!voiceEnabled) {
                window.speechSynthesis.cancel();
            }
            toggleVoiceBtn.textContent = voiceEnabled ? "Désactiver les réponses vocales" : "Activer les réponses vocales";
        });

        function addMessageToUI(message, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex w-full mt-4 space-x-3 max-w-2xl ${isUser ? 'ml-auto justify-end' : ''}`;

            if (isUser) {
                messageDiv.innerHTML = `
                    <div>
                        <div class="bg-emerald-600 p-3 rounded-l-lg rounded-br-lg text-sm text-white shadow-md">
                            ${message}
                        </div>
                    </div>
                    <div class="flex-shrink-0 h-8 w-8 rounded-full bg-slate-600 flex items-center justify-center font-bold text-xs text-white">MOI</div>
                `;
            } else {
                messageDiv.innerHTML = `
                    <div class="flex-shrink-0 h-8 w-8 rounded-full bg-emerald-500 flex items-center justify-center font-bold text-xs text-white shadow-[0_0_10px_rgba(16,185,129,0.4)]">E</div>
                    <div>
                        <div class="bg-slate-700 p-3 rounded-r-lg rounded-bl-lg text-sm text-slate-100 shadow-md border border-slate-600">
                            ${message}
                        </div>
                    </div>
                `;
            }

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const indicatorDiv = document.createElement('div');
            indicatorDiv.id = 'typing-indicator';
            indicatorDiv.className = `flex w-full mt-4 space-x-3 max-w-2xl`;
            indicatorDiv.innerHTML = `
                <div class="flex-shrink-0 h-8 w-8 rounded-full bg-emerald-500 flex items-center justify-center font-bold text-xs text-white shadow-[0_0_10px_rgba(16,185,129,0.4)]">E</div>
                <div class="flex items-center bg-slate-700 px-4 py-3 rounded-r-lg rounded-bl-lg border border-slate-600">
                    <div class="flex space-x-1">
                        <div class="h-2 w-2 bg-slate-400 rounded-full animate-bounce"></div>
                        <div class="h-2 w-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                        <div class="h-2 w-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(indicatorDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        // Gestion de la soumission du formulaire
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;

            // 1. Afficher le message utilisateur
            addMessageToUI(text, true);
            input.value = '';
            
            // 2. Afficher l'indicateur de chargement
            showTypingIndicator();

            try {
                // 3. Envoyer la requête au Moteur Core (Simulation d'un appel API vers Node.js)
                const result = await eyanoBackend.processRequest(text);
                
                // 4. Retirer l'indicateur
                removeTypingIndicator();

                // 5. Afficher la réponse d'Eyano
                addMessageToUI(result.response, false);

                // 6. Jouer la réponse vocale
                speak(result.response);

            } catch (error) {
                removeTypingIndicator();
                addMessageToUI("Erreur de communication avec le Core logique.", false);
                console.error(error);
            }
        });

        // Initialiser les voix au chargement
        initVoice();

    </script>
</body>
</html>
